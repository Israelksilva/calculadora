<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora Científica</title>

<style>
body {
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.calc {
    background: #1e293b;
    padding: 15px;
    border-radius: 20px;
    width: 340px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

#display {
    width: 100%;
    height: 60px;
    font-size: 26px;
    text-align: right;
    border: none;
    border-radius: 10px;
    margin-bottom: 10px;
    padding: 10px;
    background: #020617;
    color: #fff;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
}

button {
    height: 50px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    background: #334155;
    color: #fff;
}

button:hover {
    transform: scale(1.05);
}

.op { background: #6366f1; }
.equal { background: #22c55e; grid-column: span 2; }
.clear { background: #ef4444; }
</style>
</head>

<body>

<div class="calc">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button onclick="add('(')">(</button>
        <button onclick="add(')')">)</button>
        <button onclick="add('%')">%</button>
        <button class="clear" onclick="clearDisplay()">AC</button>
        <button class="op" onclick="add('/')">÷</button>

        <button onclick="sin()">sin</button>
        <button onclick="cos()">cos</button>
        <button onclick="tan()">tan</button>
        <button onclick="log()">log</button>
        <button class="op" onclick="add('*')">×</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button onclick="sqrt()">√</button>
        <button class="op" onclick="add('-')">−</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button onclick="power()">xʸ</button>
        <button class="op" onclick="add('+')">+</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button onclick="add(Math.PI)">π</button>
        <button onclick="add(Math.E)">e</button>

        <button onclick="add('0')">0</button>
        <button onclick="add('.')">.</button>
        <button onclick="factorial()">x!</button>
        <button class="equal" onclick="calc()">=</button>
    </div>
</div>

<script>
let display = document.getElementById("display");

function add(valor) {
    display.value += valor;
}

function clearDisplay() {
    display.value = "";
}

function calc() {
    try {
        display.value = eval(display.value);
    } catch {
        display.value = "Erro";
    }
}

// Funções científicas
function sin() {
    display.value = Math.sin(eval(display.value));
}

function cos() {
    display.value = Math.cos(eval(display.value));
}

function tan() {
    display.value = Math.tan(eval(display.value));
}

function log() {
    display.value = Math.log10(eval(display.value));
}

function sqrt() {
    display.value = Math.sqrt(eval(display.value));
}

function power() {
    display.value += "**";
}

function factorial() {
    let n = eval(display.value);
    let res = 1;
    for (let i = 1; i <= n; i++) res *= i;
    display.value = res;
}
</script>

</body>
</html>
